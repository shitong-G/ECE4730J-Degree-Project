project:
  name: scene-runtime
  strategy: default

runtime:
  default_input_resolution: 640
  default_inference_interval: 1
  default_cpu_threads: 4
  dry_run_latency_ms: 45.0
  metrics_window_frames: 120

thermal:
  normal_max_c: 65.0
  warm_max_c: 75.0
  critical_c: 82.0
  hysteresis_c: 4.0
  warm_hold_frames: 120
  hot_hold_frames: 180
  critical_hold_frames: 240
  warm_hold_sec: 30.0
  hot_hold_sec: 45.0
  critical_hold_sec: 60.0
  critical_plus_delta_c: 3.0
  critical_max_delta_c: 7.0
  pressure_hysteresis_c: 2.0
  pressure_hold_frames: 120
  pressure_hold_sec: 45.0
  target_c: 80.0
  recovery_slope_c_per_min: -0.15
  preemptive_slope_c_per_min: 0.4
  balanced_interval_cap: 12

scene:
  light_edge_density_max: 0.08
  light_motion_max: 0.05
  heavy_edge_density_min: 0.18
  heavy_motion_min: 0.15
  heavy_detection_count_min: 8

logging:
  output_dir: experiments/logs
  format: csv

inference:
  model_path: null
  onnx_providers: ["CPUExecutionProvider"]
  enable_thread_sessions: false
  thread_session_counts: [1, 2, 3, 4]

os_control:
  apply_runtime_actions: false
