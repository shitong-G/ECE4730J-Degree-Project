strategy:
  name: thermal_interval_first
  description: Thermal-aware policy that preserves 640 input and reduces duty cycle before lowering resolution

policy:
  use_scene: false
  use_thermal: true
  thermal_balanced: true
  fixed_inference_interval: null
  fixed_input_resolution: null
  fixed_cpu_threads: null
  fixed_cpu_affinity: null
  fixed_governor: null

runtime:
  default_input_resolution: 640
  default_inference_interval: 1
  default_cpu_threads: 4

thermal:
  normal_max_c: 80.0
  warm_max_c: 84.0
  critical_c: 87.0
  hysteresis_c: 2.5
  warm_hold_frames: 8
  hot_hold_frames: 10
  critical_hold_frames: 45
  warm_hold_sec: 2.0
  hot_hold_sec: 3.0
  critical_hold_sec: 10.0
  critical_plus_delta_c: 1.5
  critical_max_delta_c: 3.0
  pressure_hysteresis_c: 1.0
  pressure_hold_frames: 60
  pressure_hold_sec: 15.0
  target_c: 84.0
  recovery_slope_c_per_min: -0.05
  preemptive_slope_c_per_min: 0.8
  use_throttling_pressure: true
  soft_temp_limit_state: warm
  currently_throttled_state: critical
  arm_freq_capped_state: critical
  balanced_interval_cap: 4

  balanced_warm_recover_c: 79.0
  balanced_hot_recover_c: 83.2
  balanced_critical_recover_c: 85.5

  balanced_normal_governor: performance
  balanced_warm_resolution_steps: 0
  balanced_warm_near_hot_resolution_extra_steps: 0
  balanced_warm_interval_boost: 0
  balanced_warm_near_hot_interval_extra_boost: 0
  balanced_warm_thread_cap: 4
  balanced_warm_governor: performance

  # Interval-first cooling: keep 640 in hot states and reduce duty cycle before
  # paying the detection-quality cost of 480/320 routing.
  balanced_hot_resolution_steps: 0
  balanced_hot_interval_boost: 1
  balanced_hot_interval_min: 2
  balanced_hot_thread_cap: 4
  balanced_hot_query_budget: 200
  balanced_hot_governor: performance

  balanced_hot_plus_resolution_steps: 0
  balanced_hot_plus_interval_boost: 2
  balanced_hot_plus_interval_min: 3
  balanced_hot_plus_thread_cap: 4
  balanced_hot_plus_query_budget: 180
  balanced_hot_plus_governor: performance

  balanced_critical_resolution_steps: 1
  balanced_critical_interval_boost: 3
  balanced_critical_interval_min: 4
  balanced_critical_thread_cap: 4
  balanced_critical_query_budget: 160
  balanced_critical_governor: performance
